---
layout: default
---

<small>{{ page.date | date: "%-d %B %Y" }}</small>
<h1>{{ page.title }}</h1>

<p class="view">
    <span>by {{ page.author | default: site.author }}</span>
    {% if page.tags %}
    <br>
    <span class="post-meta post-tags">
    Tags:
    {% assign tags = page.tags | sort %}
    {% include _tagcloud.html %}
    </span>
    {% endif %}
</p>

{{content}}
